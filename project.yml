name: Dissolve
options:
  bundleIdPrefix: com.ianheadley
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
targets:
  Dissolve:
    type: application
    platform: macOS
    sources:
      - path: Dissolve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ianheadley.Dissolve
        INFOPLIST_FILE: Dissolve/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Dissolve/Resources/Dissolve.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        METAL_FAST_MATH: YES
        MTL_FAST_MATH: YES
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    dependencies: []
